<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gender & Age Predictor</title>

  <!-- Bootstrap CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h1 class="fw-bold">Gender & Age Predictor</h1>
                <p class="text-muted mb-0">
                  Upload a face image to predict gender and age range
                </p>
              </div>

              <form id="uploadForm" class="mb-4">
                <div class="mb-3">
                  <input
                    class="form-control form-control-lg"
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    required
                  />
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg rounded-3">
                    Predict
                  </button>
                </div>
              </form>

              <div class="text-center mb-4">
                <img id="previewImage" class="img-preview d-none" alt="Preview" />
              </div>

              <div id="loadingBox" class="alert alert-info d-none" role="alert">
                Processing image...
              </div>

              <div id="resultBox" class="result-card d-none">
                <h4 class="mb-3">Prediction Result</h4>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="result-item">
                      <span class="label">Gender</span>
                      <span id="genderResult" class="value">-</span>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="result-item">
                      <span class="label">Age Range</span>
                      <span id="ageResult" class="value">-</span>
                    </div>
                  </div>
                </div>
              </div>

              <div id="errorBox" class="alert alert-danger d-none mt-4" role="alert"></div>
            </div>
          </div>

          <p class="text-center text-muted mt-3 small">
            Built with FastAPI + Random Forest + Render
          </p>
           <p class="text-center text-muted mt-3 small">
            Developed by Washifur Rahman
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
